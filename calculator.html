<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <link rel="stylesheet" href="calc.css">
</head>

<body>

<div class="calculator">

  <input id="screen" type="text" readonly>

  <div class="buttons">

    <button onclick="press('7')">7</button>
    <button onclick="press('8')">8</button>
    <button onclick="press('9')">9</button>
    <button onclick="press('/')">÷</button>

    <button onclick="press('4')">4</button>
    <button onclick="press('5')">5</button>
    <button onclick="press('6')">6</button>
    <button onclick="press('*')">×</button>

    <button onclick="press('1')">1</button>
    <button onclick="press('2')">2</button>
    <button onclick="press('3')">3</button>
    <button onclick="press('-')">−</button>

    <button onclick="press('0')">0</button>
    <button onclick="press('.')">.</button>
    <button onclick="clearScreen()">C</button>
    <button onclick="calculate()">=</button>

    <!-- SCIENTIFIC ROW -->
    <button onclick="press('π')">π</button>
    <button onclick="press('**')">^</button>
    <button onclick="sqrt()">√</button>
    <button onclick="toRadians()">°</button>

    <button onclick="press('+')">+</button>
    <button onclick="press('<')"><</button>
    <button onclick="press('>')">></button>
    <button onclick="delta()">∆</button>

    <button onclick="press('sin(')">sin</button>
    <button onclick="press('cos(')">cos</button>
    <button onclick="press('tan(')">tan</button>
    <button onclick="check()">✓</button>

  </div>

</div>

<script src="calc.js"></script>
</body>
</html>
